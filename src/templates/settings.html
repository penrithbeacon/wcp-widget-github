<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Settings</title>
<script type="application/ld+json">{{ jsonld|safe }}</script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;
    --text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;
    --green:#3fb950;--red:#f85149;--yellow:#d29922;--blue:#58a6ff;--radius:8px;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;overflow:hidden;}
  *::-webkit-scrollbar{width:8px;height:8px;}
  *::-webkit-scrollbar-track{background:var(--surface2);}
  *::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  *::-webkit-scrollbar-thumb:hover{background:var(--muted);}
  *{scrollbar-color:var(--border) var(--surface2);scrollbar-width:thin;}
  .wrap{display:flex;flex-direction:column;height:100%;}
  .topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .title{font-size:14px;font-weight:600;flex:1;}
  .status{font-size:11px;padding:3px 8px;border-radius:4px;}
  .status.ok{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3);}
  .status.warn{background:rgba(210,153,34,.15);color:var(--yellow);border:1px solid rgba(210,153,34,.3);}
  .body{flex:1;overflow-y:auto;padding:20px 24px;}
  .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px 18px;margin-bottom:14px;}
  .section h3{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;
    letter-spacing:.05em;margin-bottom:10px;}
  .grid{display:grid;grid-template-columns:140px 1fr;gap:10px 14px;align-items:center;}
  .grid label{font-size:12px;color:var(--muted);text-align:right;}
  .grid input{background:var(--surface2);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;width:100%;}
  .grid input:focus{outline:none;border-color:var(--accent);}
  .grid .account-display{font-size:13px;color:var(--text);padding:8px 10px;background:var(--surface2);
    border:1px solid var(--border);border-radius:6px;font-family:'SF Mono',Monaco,monospace;}
  .hint{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.6;}
  .hint a{color:var(--blue);text-decoration:none;}
  .hint a:hover{text-decoration:underline;}
  .btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:inherit;
    font-size:12px;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .15s;}
  .btn:hover{background:var(--border);border-color:var(--muted);}
  .btn-accent{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:600;}
  .btn-accent:hover{opacity:.85;background:var(--accent);}
  .footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 24px;border-top:1px solid var(--border);
    flex-shrink:0;background:var(--bg);}
  .saved{font-size:11px;color:var(--green);align-self:center;margin-right:8px;display:none;}
  .saved.show{display:inline;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">⚙ Settings</div>
    <div class="status warn" id="status">Loading…</div>
  </div>
  <div class="body">
    <div class="section">
      <h3>GitHub Credentials</h3>
      <div class="grid">
        <label for="token">Personal Access Token</label>
        <input id="token" type="password" autocomplete="off" placeholder="paste new token to set or replace">
        <label>Connected account</label>
        <div class="account-display" id="account-display">—</div>
      </div>
      <div class="hint">
        The token must have the <strong>repo</strong> scope to access private repositories,
        or <strong>public_repo</strong> for public repositories only.<br>
        Create one at <a href="https://github.com/settings/tokens" target="_blank" rel="noopener">github.com/settings/tokens</a>.
        See the Help component for step-by-step instructions.
      </div>
    </div>
  </div>
  <div class="footer">
    <span class="saved" id="saved">✓ Saved</span>
    <button class="btn" onclick="loadStatus()">Reload</button>
    <button class="btn btn-accent" onclick="save()">Save Settings</button>
  </div>
</div>

<script>
const WCP_INSTANCE_ID      = "{{ wcp_instance_id|default('', true) }}";
const WCP_ORCHESTRATION_ID = "{{ wcp_orchestration_id|default('', true) }}";
const WCP_APPLICATION_ID   = "{{ wcp_application_id|default('', true) }}";
function wcpFetch(url, opts) {
  opts = opts || {};
  const extra = {};
  if (WCP_INSTANCE_ID)      extra['Wcp-Instance-Id']      = WCP_INSTANCE_ID;
  if (WCP_ORCHESTRATION_ID) extra['Wcp-Orchestration-Id'] = WCP_ORCHESTRATION_ID;
  if (WCP_APPLICATION_ID)   extra['Wcp-Application-Id']   = WCP_APPLICATION_ID;
  opts.headers = Object.assign({}, opts.headers || {}, extra);
  return fetch(url, opts);
}

async function loadStatus() {
  try {
    const r = await wcpFetch('/widget/api/config-status');
    const d = await r.json();
    document.getElementById('token').placeholder = d.githubTokenMasked
      ? `Current: ${d.githubTokenMasked} — paste new to replace`
      : 'ghp_… paste your token here';
    document.getElementById('token').value = '';
    document.getElementById('account-display').textContent = d.githubUser || '—';
    const st = document.getElementById('status');
    if (d.configured && d.githubUser) {
      st.textContent = `✓ Connected as ${d.githubUser}`;
      st.className = 'status ok';
    } else if (d.configured) {
      st.textContent = '✓ Token saved';
      st.className = 'status ok';
    } else {
      st.textContent = '⚠ Not configured';
      st.className = 'status warn';
    }
  } catch (e) {
    const st = document.getElementById('status');
    st.textContent = '✗ Error: ' + e.message;
    st.className = 'status warn';
  }
}

async function save() {
  const body = {};
  const token = document.getElementById('token').value.trim();
  if (token) body.githubToken = token;
  if (!token) {
    alert('Paste a Personal Access Token to save.');
    return;
  }
  try {
    const r = await wcpFetch('/widget/configure', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.error || 'Save failed');
    const s = document.getElementById('saved');
    s.classList.add('show');
    setTimeout(() => s.classList.remove('show'), 2000);
    loadStatus();
  } catch (e) {
    alert('Save failed: ' + e.message);
  }
}

loadStatus();
window.parent?.postMessage({ type: 'wcp:ready' }, '*');
window.addEventListener('message', e => {
  if (e.data?.type === 'wcp:context' && e.data.theme)
    for (const [k, v] of Object.entries(e.data.theme))
      document.documentElement.style.setProperty(k, v);
});
</script>
</body>
</html>
