<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Repositories</title>
<script type="application/ld+json">{{ jsonld|safe }}</script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;
    --text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;
    --green:#3fb950;--red:#f85149;--yellow:#d29922;--blue:#58a6ff;--radius:8px;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;overflow:hidden;}
  *::-webkit-scrollbar{width:8px;height:8px;}
  *::-webkit-scrollbar-track{background:var(--surface2);}
  *::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  *::-webkit-scrollbar-thumb:hover{background:var(--muted);}
  *{scrollbar-color:var(--border) var(--surface2);scrollbar-width:thin;}
  .wrap{display:flex;flex-direction:column;height:100%;}
  .topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .title{font-size:14px;font-weight:600;flex:1;}
  .count{font-size:11px;color:var(--muted);}
  .btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:inherit;
    font-size:12px;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .15s;}
  .btn:hover{background:var(--border);border-color:var(--muted);}
  .body{flex:1;overflow-y:auto;padding:14px 16px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
  .empty{text-align:center;color:var(--muted);font-size:12px;padding:40px 16px;}
  .err{color:var(--red);font-size:12px;padding:14px;background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.2);border-radius:6px;}
  .repo-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:12px 14px;display:flex;flex-direction:column;gap:6px;transition:border-color .15s;}
  .repo-card:hover{border-color:var(--accent);}
  .repo-card.archived{opacity:.5;}
  .repo-header{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .repo-name{font-weight:600;font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .badge{font-size:10px;padding:1px 6px;border-radius:3px;border:1px solid;white-space:nowrap;flex-shrink:0;}
  .badge-ok{color:var(--green);border-color:rgba(63,185,80,.4);background:rgba(63,185,80,.08);}
  .badge-warn{color:var(--yellow);border-color:rgba(210,153,34,.4);background:rgba(210,153,34,.08);}
  .badge-muted{color:var(--muted);border-color:var(--border);opacity:.7;}
  .repo-desc{font-size:12px;color:var(--muted);line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .repo-footer{display:flex;align-items:center;gap:8px;margin-top:auto;flex-wrap:wrap;}
  .lang-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .lang-label{font-size:11px;color:var(--muted);}
  .push-time{font-size:11px;color:var(--muted);margin-left:auto;}
  .open-btn{font-size:11px;padding:3px 10px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">📦 Repositories</div>
    <div class="count" id="count"></div>
    <button class="btn" onclick="load(true)">Refresh</button>
  </div>
  <div class="body">
    <div class="grid" id="grid">
      <div class="empty">Loading…</div>
    </div>
  </div>
</div>

<script>
const WCP_INSTANCE_ID      = "{{ wcp_instance_id|default('', true) }}";
const WCP_ORCHESTRATION_ID = "{{ wcp_orchestration_id|default('', true) }}";
const WCP_APPLICATION_ID   = "{{ wcp_application_id|default('', true) }}";
function wcpFetch(url, opts) {
  opts = opts || {};
  const extra = {};
  if (WCP_INSTANCE_ID)      extra['Wcp-Instance-Id']      = WCP_INSTANCE_ID;
  if (WCP_ORCHESTRATION_ID) extra['Wcp-Orchestration-Id'] = WCP_ORCHESTRATION_ID;
  if (WCP_APPLICATION_ID)   extra['Wcp-Application-Id']   = WCP_APPLICATION_ID;
  opts.headers = Object.assign({}, opts.headers || {}, extra);
  return fetch(url, opts);
}

const LANG_COLORS = {
  JavaScript:'#f1e05a', TypeScript:'#3178c6', Python:'#3572A5',
  Rust:'#dea584', Go:'#00ADD8', HTML:'#e34c26', CSS:'#563d7c',
  Shell:'#89e051', Ruby:'#701516', Java:'#b07219', C:'#555555',
  'C++':'#f34b7d', 'C#':'#239120', Swift:'#F05138', Kotlin:'#A97BFF',
  PHP:'#4F5D95', Markdown:'#083fa1',
};

function escape(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function relTime(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)   return 'just now';
  if (m < 60)  return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24)  return h + 'h ago';
  const d = Math.floor(h / 24);
  if (d < 30)  return d + 'd ago';
  const mo = Math.floor(d / 30);
  if (mo < 12) return mo + 'mo ago';
  return Math.floor(mo / 12) + 'y ago';
}

async function load(force) {
  const grid = document.getElementById('grid');
  const count = document.getElementById('count');
  if (force) grid.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const r = await wcpFetch('/widget/api/repos');
    const d = await r.json();
    if (!d.success) {
      grid.innerHTML = `<div class="err">${escape(d.error || 'Unknown error')}</div>`;
      count.textContent = '';
      return;
    }
    const repos = d.data.repos || [];
    count.textContent = repos.length ? `${repos.length} repositor${repos.length === 1 ? 'y' : 'ies'} · sorted by last push` : '';
    if (!repos.length) {
      grid.innerHTML = '<div class="empty">No repositories found.</div>';
      return;
    }
    grid.innerHTML = repos.map(repo => {
      const langColor = LANG_COLORS[repo.language] || 'var(--muted)';
      const privBadge = repo.private
        ? `<span class="badge badge-warn">private</span>`
        : `<span class="badge badge-ok">public</span>`;
      const archBadge = repo.archived
        ? `<span class="badge badge-muted">archived</span>`
        : '';
      const forkBadge = repo.fork
        ? `<span class="badge badge-muted">fork</span>`
        : '';
      const langHtml = repo.language
        ? `<span class="lang-dot" style="background:${langColor}"></span><span class="lang-label">${escape(repo.language)}</span>`
        : '';
      return `<div class="repo-card${repo.archived ? ' archived' : ''}">
        <div class="repo-header">
          <span class="repo-name" title="${escape(repo.full_name)}">${escape(repo.name)}</span>
          ${privBadge}${archBadge}${forkBadge}
        </div>
        <div class="repo-desc">${repo.description ? escape(repo.description) : '<span style="opacity:.4;">No description</span>'}</div>
        <div class="repo-footer">
          ${langHtml}
          <span class="push-time">${escape(relTime(repo.pushed_at))}</span>
          <button class="btn open-btn" onclick="window.open('${escape(repo.html_url)}','_blank')">Open ↗</button>
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    grid.innerHTML = `<div class="err">${escape(e.message)}</div>`;
  }
}

load();
window.parent?.postMessage({ type: 'wcp:ready' }, '*');
window.addEventListener('message', e => {
  if (e.data?.type === 'wcp:context' && e.data.theme)
    for (const [k, v] of Object.entries(e.data.theme))
      document.documentElement.style.setProperty(k, v);
});
</script>
</body>
</html>
