<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Widget</title>
<script type="application/ld+json">{{ jsonld|safe }}</script>
<style>
  html,body{margin:0;padding:0;height:100%;background:var(--bg,#0d1117);color:var(--text,#e6edf3);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;}
  .root{padding:20px;display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;height:100%;text-align:center;}
  h1{font-size:16px;margin:0 0 6px;color:var(--accent,#58a6ff);}
  p{margin:0;color:var(--muted,#8b949e);font-size:12px;max-width:480px;line-height:1.5;}
  ul{margin:8px 0 0;padding:0;list-style:none;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  li a{color:var(--accent,#58a6ff);text-decoration:none;font-size:12px;padding:6px 12px;border:1px solid var(--border,#30363d);border-radius:6px;}
  li a:hover{background:rgba(88,166,255,.08);}
</style>
</head>
<body>
  <div class="root">
    <h1>GitHub WCP Widget</h1>
    <p>This widget container exposes three components. Add each one to its own stave from the dashboard's Add Widget flow.</p>
    <ul>
      <li><a href="/widget/repos">Repositories</a></li>
      <li><a href="/widget/settings">Settings</a></li>
      <li><a href="/widget/help">Help</a></li>
    </ul>
  </div>
<script>
  window.parent?.postMessage({ type: 'wcp:ready' }, '*');
  window.addEventListener('message', e => {
    if (e.data?.type === 'wcp:context' && e.data.theme)
      for (const [k, v] of Object.entries(e.data.theme))
        document.documentElement.style.setProperty(k, v);
  });
</script>
</body>
</html>
